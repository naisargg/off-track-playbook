<svg viewBox="0 0 520 160" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated Formula 1 car silhouette in red and carbon">
  <defs>
    <linearGradient id="car-red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff6070"/>
      <stop offset="0.35" stop-color="#e10032"/>
      <stop offset="1" stop-color="#6e0016"/>
    </linearGradient>
    <linearGradient id="car-red-dark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c4002a"/>
      <stop offset="1" stop-color="#570011"/>
    </linearGradient>
    <linearGradient id="car-chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#8a919b"/>
    </linearGradient>
    <linearGradient id="car-sheen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#fff" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#fff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <pattern id="car-carbon" width="5" height="5" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="5" height="5" fill="#1b1b1f"/>
      <line x1="0" y1="0" x2="0" y2="5" stroke="#2e2e34" stroke-width="1.4"/>
    </pattern>
    <path id="car-chassis" d="M 36 108
      C 90 102, 140 92, 180 84
      L 205 80
      C 220 78, 240 78, 252 80
      L 262 78
      C 268 68, 278 64, 284 66
      C 306 72, 336 80, 365 86
      C 390 91, 415 94, 438 96
      L 438 104
      C 400 106, 350 108, 300 108
      C 260 109, 220 111, 190 112
      C 140 114, 80 113, 36 112 Z"/>
    <mask id="car-body-mask">
      <use href="#car-chassis" fill="#fff"/>
      <path d="M 228 92 C 260 88, 300 90, 340 96 C 332 108, 300 112, 270 112 C 248 112, 232 104, 228 92 Z" fill="#fff"/>
    </mask>
  </defs>

  <style>
    #car-float { animation: car-float 4.5s ease-in-out infinite alternate; }
    #car-sheen-band { animation: car-sheen 5s ease-in-out infinite; }
    .car-spokes { animation: car-spin 1.1s linear infinite; transform-box: fill-box; transform-origin: center; }
    .car-streak { stroke-dasharray: 40 100; animation: car-streak 1.6s linear infinite; }
    @keyframes car-float { from { transform: translateY(0); } to { transform: translateY(-4px); } }
    @keyframes car-sheen { 0% { transform: translateX(-560px) skewX(-18deg); } 55% { transform: translateX(560px) skewX(-18deg); } 100% { transform: translateX(560px) skewX(-18deg); } }
    @keyframes car-spin { to { transform: rotate(360deg); } }
    @keyframes car-streak { to { stroke-dashoffset: -140; } }
    @media (prefers-reduced-motion: reduce) {
      #car-float, #car-sheen-band, .car-spokes, .car-streak { animation: none; }
    }
  </style>

  <!-- ground shadow -->
  <ellipse cx="240" cy="146" rx="225" ry="6" fill="#000" opacity="0.4"/>

  <g id="car-float">
    <!-- speed streaks trailing the car -->
    <line class="car-streak" x1="452" y1="58" x2="519" y2="58" stroke="#e10032" stroke-width="2" opacity="0.5"/>
    <line class="car-streak" x1="462" y1="90" x2="519" y2="90" stroke="#8a919b" stroke-width="1.5" opacity="0.4" style="animation-delay:0.4s"/>
    <line class="car-streak" x1="446" y1="120" x2="519" y2="120" stroke="#e10032" stroke-width="1.5" opacity="0.3" style="animation-delay:0.8s"/>

    <!-- floor + diffuser -->
    <path d="M 138 118 L 350 116 L 352 122 L 140 124 Z" fill="#141417"/>
    <path d="M 350 118 L 428 104 L 432 115 L 354 124 Z" fill="#141417"/>

    <!-- chassis -->
    <use href="#car-chassis" fill="url(#car-red)"/>

    <!-- carbon sidepod -->
    <path d="M 228 92 C 260 88, 300 90, 340 96 C 332 108, 300 112, 270 112 C 248 112, 232 104, 228 92 Z" fill="url(#car-carbon)"/>

    <!-- cockpit opening -->
    <path d="M 208 81 C 222 77, 240 77, 252 80 L 250 85 C 236 87, 220 86, 208 81 Z" fill="#101013"/>

    <!-- halo -->
    <path d="M 206 80 C 216 62, 244 59, 258 76" fill="none" stroke="url(#car-chrome)" stroke-width="4" stroke-linecap="round"/>
    <line x1="232" y1="62" x2="232" y2="78" stroke="url(#car-chrome)" stroke-width="2.6"/>

    <!-- T-cam -->
    <path d="M 276 66 C 278 62, 284 62, 286 66 C 283 68, 279 68, 276 66 Z" fill="#101013"/>

    <!-- chrome pinstripes -->
    <path d="M 44 106 C 100 99, 150 90, 200 81" fill="none" stroke="url(#car-chrome)" stroke-width="1.4" opacity="0.85"/>
    <path d="M 286 68 C 320 76, 360 84, 420 92" fill="none" stroke="url(#car-chrome)" stroke-width="1.4" opacity="0.7"/>

    <!-- sheen sweep, clipped to the body -->
    <g mask="url(#car-body-mask)">
      <rect id="car-sheen-band" x="-40" y="50" width="170" height="80" fill="url(#car-sheen)"/>
    </g>

    <!-- rear wing: beam, swan-neck, planes, endplate -->
    <path d="M 396 96 L 440 92 L 440.5 97 L 397 100 Z" fill="#1b1b1f"/>
    <path d="M 400 88 C 408 78, 412 70, 415 61 L 422 61 C 419 70, 413 80, 407 90 Z" fill="#141417"/>
    <path d="M 372 60 L 446 54 L 447 62 L 374 68 Z" fill="url(#car-red)"/>
    <path d="M 376 72 L 442 67 L 442.5 72 L 377 77 Z" fill="#1b1b1f"/>
    <rect x="438" y="50" width="16" height="57" rx="4" fill="url(#car-carbon)" stroke="#2e2e34" stroke-width="1"/>

    <!-- wheels (outboard, in front of chassis) -->
    <g>
      <circle cx="110" cy="112" r="27" fill="#17171a"/>
      <circle cx="110" cy="112" r="27" fill="none" stroke="#2e2e34" stroke-width="2"/>
      <circle cx="110" cy="112" r="14" fill="none" stroke="url(#car-chrome)" stroke-width="2.6"/>
      <g class="car-spokes">
        <line x1="110" y1="101" x2="110" y2="107" stroke="url(#car-chrome)" stroke-width="2.2"/>
        <line x1="100" y1="117" x2="106" y2="114" stroke="url(#car-chrome)" stroke-width="2.2"/>
        <line x1="120" y1="117" x2="114" y2="114" stroke="url(#car-chrome)" stroke-width="2.2"/>
      </g>
      <circle cx="110" cy="112" r="4" fill="#e10032"/>
    </g>
    <g>
      <circle cx="370" cy="112" r="27" fill="#17171a"/>
      <circle cx="370" cy="112" r="27" fill="none" stroke="#2e2e34" stroke-width="2"/>
      <circle cx="370" cy="112" r="14" fill="none" stroke="url(#car-chrome)" stroke-width="2.6"/>
      <g class="car-spokes">
        <line x1="370" y1="101" x2="370" y2="107" stroke="url(#car-chrome)" stroke-width="2.2"/>
        <line x1="360" y1="117" x2="366" y2="114" stroke="url(#car-chrome)" stroke-width="2.2"/>
        <line x1="380" y1="117" x2="374" y2="114" stroke="url(#car-chrome)" stroke-width="2.2"/>
      </g>
      <circle cx="370" cy="112" r="4" fill="#e10032"/>
    </g>

    <!-- suspension arms over wheels -->
    <path d="M 148 100 L 116 108" stroke="#141417" stroke-width="3"/>
    <path d="M 150 112 L 118 114" stroke="#141417" stroke-width="2.2"/>
    <path d="M 334 102 L 366 108" stroke="#141417" stroke-width="3"/>
    <path d="M 332 112 L 362 114" stroke="#141417" stroke-width="2.2"/>

    <!-- front wing (ahead of and in front of the front tire) -->
    <rect x="8" y="110" width="10" height="26" rx="3" fill="url(#car-carbon)" stroke="#2e2e34" stroke-width="0.8"/>
    <path d="M 16 124 L 100 120 L 101 127 L 17 131 Z" fill="url(#car-red)"/>
    <path d="M 18 118 L 94 114.5 L 94.5 119 L 18.5 122.5 Z" fill="url(#car-red-dark)"/>
    <path d="M 36 110 L 54 109 L 52 121 L 40 122 Z" fill="url(#car-red-dark)"/>
  </g>
</svg>
