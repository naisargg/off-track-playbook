<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Off-Track Playbook mark: a racing line exiting a circuit ring">
  <!-- the circuit: a ring broken open at the top right -->
  <path d="M 45.5 33.9 A 16 16 0 1 1 38 24.1"
        stroke="currentColor" stroke-width="2.6" stroke-linecap="round"/>
  <!-- the racing line: follows the circuit, then leaves it -->
  <path d="M 18 44 C 24 53, 38 52, 43 42 C 46 36, 45 30, 56 12"
        stroke="#e10032" stroke-width="2.6" stroke-linecap="round" class="logo-line"/>
  <!-- start node -->
  <circle cx="18" cy="44" r="2.4" fill="#e10032"/>
  <!-- the data point it becomes -->
  <rect x="53.5" y="7" width="5" height="5" fill="#e10032"/>
</svg>
