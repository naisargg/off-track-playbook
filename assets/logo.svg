<svg viewBox="0 0 96 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Off-Track Playbook crest: a racing shield with an ascending trajectory breaking out through its top edge">
  <defs>
    <linearGradient id="otp-shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#232019"/>
      <stop offset="1" stop-color="#0c0b09"/>
    </linearGradient>
    <linearGradient id="otp-line" x1="0" y1="1" x2="0.6" y2="0">
      <stop offset="0" stop-color="#a80022"/>
      <stop offset="0.55" stop-color="#e10032"/>
      <stop offset="1" stop-color="#ff3d55"/>
    </linearGradient>
    <linearGradient id="otp-bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4f1e9"/>
      <stop offset="1" stop-color="#b8b3a6"/>
    </linearGradient>
  </defs>

  <!-- shield body -->
  <path d="M 10 14 L 86 14 L 86 66 C 86 92 68 106 48 114 C 28 106 10 92 10 66 Z" fill="url(#otp-shield)"/>

  <!-- shield outline, broken on the top edge where the trajectory escapes -->
  <path class="crest-shield" d="M 82 14 L 86 14 L 86 66 C 86 92 68 106 48 114 C 28 106 10 92 10 66 L 10 14 L 70 14"
        fill="none" stroke="#ece9e2" stroke-width="2.5" stroke-linecap="round"/>

  <!-- inner hairline -->
  <path d="M 16 20 L 80 20 L 80 64 C 80 86 66 98 48 106 C 30 98 16 86 16 64 Z"
        fill="none" stroke="#ece9e2" stroke-opacity="0.22" stroke-width="1"/>

  <!-- ascending bars: the playbook -->
  <rect class="crest-bar" x="26" y="74" width="9" height="16" rx="1.5" fill="url(#otp-bar)"/>
  <rect class="crest-bar" x="42" y="62" width="9" height="28" rx="1.5" fill="url(#otp-bar)"/>
  <rect class="crest-bar" x="58" y="48" width="9" height="42" rx="1.5" fill="url(#otp-bar)"/>

  <!-- the trajectory: kissing each peak, then out through the top -->
  <path class="crest-line" d="M 30.5 73 C 37 69, 41 64, 46.5 61 C 53 56.5, 57.5 52.5, 62.5 47 C 69.5 39.5, 73.5 25, 77 7"
        fill="none" stroke="url(#otp-line)" stroke-width="4" stroke-linecap="round"/>
  <circle class="crest-dot" cx="77" cy="7" r="3.4" fill="#ff3d55"/>
</svg>
