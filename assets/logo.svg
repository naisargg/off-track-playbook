<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Off-Track Playbook mark: a grid of dots with one dot leaving the formation">
  <!-- the grid — one position vacant, top right -->
  <circle cx="12" cy="24" r="4.5" fill="currentColor"/>
  <circle cx="26" cy="24" r="4.5" fill="currentColor"/>
  <circle cx="12" cy="38" r="4.5" fill="currentColor"/>
  <circle cx="26" cy="38" r="4.5" fill="currentColor"/>
  <circle cx="40" cy="38" r="4.5" fill="currentColor"/>
  <circle cx="12" cy="52" r="4.5" fill="currentColor"/>
  <circle cx="26" cy="52" r="4.5" fill="currentColor"/>
  <circle cx="40" cy="52" r="4.5" fill="currentColor"/>
  <!-- the one that left — continuing the grid's own diagonal, off the grid -->
  <circle cx="54" cy="10" r="4.5" fill="#e10032"/>
</svg>
