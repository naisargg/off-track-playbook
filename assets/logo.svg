<svg viewBox="0 0 90 130" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="The Off-Track Playbook crest: a yellow racing shield with italic speed blades and OTP monogram">
  <defs>
    <linearGradient id="otp-field" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd94d"/>
      <stop offset="0.5" stop-color="#ffd500"/>
      <stop offset="1" stop-color="#efb900"/>
    </linearGradient>
    <linearGradient id="otp-blade" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#c4002a"/>
      <stop offset="1" stop-color="#ef1a3f"/>
    </linearGradient>
  </defs>

  <!-- shield field -->
  <path d="M 8 6 L 82 6 L 82 78 C 82 104 66 116 45 124 C 24 116 8 104 8 78 Z"
        fill="url(#otp-field)" stroke="#15130f" stroke-width="2.5"/>

  <!-- top band -->
  <path class="crest-band" d="M 9.2 7.2 L 80.8 7.2 L 80.8 17 L 9.2 17 Z" fill="#e10032"/>
  <rect x="9.2" y="17" width="71.6" height="1.6" fill="#15130f"/>

  <!-- speed blades: the negative space between them tapers upward, a rising 1 -->
  <path class="crest-blade" d="M 22 98 L 48 28 L 58 28 L 38 98 Z" fill="#15130f"/>
  <path class="crest-blade" d="M 48 90 L 60 36 L 67 36 L 55 90 Z" fill="url(#otp-blade)"/>

  <!-- monogram, where the scuderia keeps its letters -->
  <text class="crest-text" x="45" y="113.5" text-anchor="middle"
        font-family="Fraunces, Georgia, 'Times New Roman', serif" font-style="italic"
        font-weight="650" font-size="14" letter-spacing="1" fill="#15130f">OTP</text>
</svg>
